# Apache Configuration for Pomodoro App
# Place this file at: /etc/apache2/sites-available/pomodoro.conf
# Or for SSL: /etc/apache2/sites-available/pomodoro-le-ssl.conf (alongside your existing SSL config)

# === HTTP (port 80) - redirects to HTTPS ===
<VirtualHost *:80>
    ServerName rgbxyz.ddns.net

    # Redirect HTTP to HTTPS
    Redirect permanent / https://rgbxyz.ddns.net/
</VirtualHost>

# === HTTPS (port 443) ===
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName rgbxyz.ddns.net

    # === SSL Configuration (adjust paths to match your certs) ===
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/rgbxyz.ddns.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/rgbxyz.ddns.net/privkey.pem

    # === Proxy API requests to Node.js ===
    # The frontend at /Pomodoro/ calls /Pomodoro/api/*
    # This forwards /api/* to the Node.js server running on port 3000
    ProxyPreserveHost On
    ProxyPass /Pomodoro/api http://localhost:3000/api
    ProxyPassReverse /Pomodoro/api http://localhost:3000/api

    # === Serve static files from the public folder ===
    # URL path /Pomodoro/ maps to /var/www/html/Pomodoro/public/
    Alias /Pomodoro /var/www/html/Pomodoro/public
    <Directory /var/www/html/Pomodoro/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # === Optional: Make /Pomodoro the default (so rgbxyz.ddns.net goes directly to app) ===
    # RedirectMatch ^/$ /Pomodoro/

    ErrorLog ${APACHE_LOG_DIR}/pomodoro-error.log
    CustomLog ${APACHE_LOG_DIR}/pomodoro-access.log combined
</VirtualHost>
</IfModule>
